name: Daily AI News Update

# 每天北京时间早 8:00 自动运行（UTC 0:00）
# 也支持手动触发
on:
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00 = 北京时间 08:00
  workflow_dispatch:  # 手动触发按钮
    inputs:
      target_date:
        description: '单日补跑，格式 YYYY-MM-DD；留空则默认今天'
        required: false
        default: ''
      backfill_dates:
        description: '批量回补日期列表，逗号分隔，例如 2026-05-22,2026-05-25'
        required: false
        default: ''
      backfill_start:
        description: '批量回补起始日期 YYYY-MM-DD'
        required: false
        default: ''
      backfill_end:
        description: '批量回补结束日期 YYYY-MM-DD'
        required: false
        default: ''

permissions:
  contents: write  # 需要写权限来 push 更新
  issues: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # 超时保护

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run news fetch script
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}  # 可选
          TARGET_DATE: ${{ github.event.inputs.target_date }}
        run: |
          if [ -n "${{ github.event.inputs.backfill_dates }}" ]; then
            python scripts/backfill_news.py --dates "${{ github.event.inputs.backfill_dates }}"
          elif [ -n "${{ github.event.inputs.backfill_start }}" ] && [ -n "${{ github.event.inputs.backfill_end }}" ]; then
            python scripts/backfill_news.py --start "${{ github.event.inputs.backfill_start }}" --end "${{ github.event.inputs.backfill_end }}"
          else
            python scripts/fetch_news.py
          fi

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet data/news.js; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in data/news.js"
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "AI Toolkit Bot"
          git config user.email "bot@ai-toolkit.local"
          
          # 获取今天日期
          TODAY=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
          
          git add data/news.js
          git commit -m "📰 每日资讯自动更新 ${TODAY}"
          git push

      - name: Create or update failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[Automation] Daily AI News Update failed';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const inputs = context.payload.inputs || {};
            const mode = (inputs.backfill_dates || (inputs.backfill_start && inputs.backfill_end)) ? 'backfill' : 'single';
            const body = [
              '每日 AI 资讯自动化运行失败。',
              '',
              `- 时间: ${new Date().toISOString()}`,
              `- 模式: ${mode}`,
              `- target_date: ${inputs.target_date || 'today'}`,
              `- backfill_dates: ${inputs.backfill_dates || 'n/a'}`,
              `- backfill_range: ${inputs.backfill_start && inputs.backfill_end ? `${inputs.backfill_start} -> ${inputs.backfill_end}` : 'n/a'}`,
              `- run: ${runUrl}`,
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const existing = issues.find(issue => issue.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `新的失败记录：${runUrl}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
            }

      - name: Close failure issue on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[Automation] Daily AI News Update failed';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const existing = issues.find(issue => issue.title === title);
            if (!existing) return;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              body: `自动化已恢复成功：${runUrl}`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              state: 'closed'
            });
